version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
      npm-safe-version-updates:
        applies-to: version-updates
        update-types:
          - "patch"
          - "minor"
        patterns:
          - "*"
